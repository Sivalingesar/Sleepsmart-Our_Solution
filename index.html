<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL SLEEP OPTIMISER</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --text-primary: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* --- HERO SECTION FIX --- */
        .hero-section {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        header#text-container {
            display: block;
            position: relative;
            width: 100vw; /* Full width ensures absolute center */
            height: 30vh;
        }

        h1, .copy {
            font-family: "Lilita One", cursive;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            font-size: 13vw; 
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            /* Centering transform */
            transform: translate(-50%, -50%);
            line-height: 1;
            width: 100%;
            text-align: center;
            margin: 0;
            text-transform: uppercase;
            white-space: nowrap;
        }

        h1 { color: #e7e7e7; z-index: 50; }
        .copy-1 { color: #02A2F8; z-index: 40; } 
        .copy-2 { color: #00b1f2af; z-index: 30; } 
        .copy-3 { color: #4f8ad1; z-index: 20; } 
        .copy-4 { color: #166894c5; z-index: 10; } 

        /* --- CONTENT & SCROLL --- */
        .zoom-track {
            position: relative;
            height: 350vh;
            width: 100%;
        }

        .sticky-wrapper {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .content-block {
            position: relative;
            z-index: 20;
            background: var(--bg-color);
            width: 100%;
        }

        .scroll-arrow {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            animation: bounce 2s infinite;
            z-index: 60;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -15px); }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <header id="text-container">
            <h1>Our Solution</h1>
            <span aria-hidden="true" class="copy copy-1">Our Solution</span>
            <span aria-hidden="true" class="copy copy-2">Our Solution</span>
            <span aria-hidden="true" class="copy copy-3">Our Solution</span>
            <span aria-hidden="true" class="copy copy-4">Our Solution</span>
        </header>

        <div class="scroll-arrow" onclick="document.getElementById('first-content').scrollIntoView({behavior:'smooth'})">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </section>

    <div class="content-block" id="first-content">
        <object type="text/html" data="oursolution12animation.html" width="100%" height="2000"></object>
    </div>

    <div class="zoom-track" id="zoom-scroll-track">
        <div class="sticky-wrapper">
            <object id="zoom-iframe" type="text/html" data="oursolutionanimationzoom.html" width="100%" height="100%"></object>
        </div>
    </div>

    <div class="content-block">
        <object type="text/html" data="oursolutionfindoutmorebutton.html" width="100%" height="100"></object>
        <object type="text/html" data="hovertextboxsolution6.html" width="100%" height="300"></object>
        <object type="text/html" data="solutionfeaturecarousel.html" width="100%" height="700"></object>
        <object type="text/html" data="getstartedbutton.html" width="100%" height="100"></object>
    </div>

    <script>
        const mouse = { x: 0, y: 0 };
        const center = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const distance = { x: 0, y: 0 };
        const lerped = { x: 0, y: 0 };
        let isSimulating = true;

        const perspective = 500;
        const translateZ = -14; 
        const rotateMult = 2.5; 
        const skewMult = 2.5;

        const copies = document.querySelectorAll(".copy");

        function updateCenter() {
            center.x = window.innerWidth / 2;
            center.y = window.innerHeight / 2;
        }

        function onMouseMove(e) {
            isSimulating = false;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            distance.x = center.x - mouse.x;
            distance.y = center.y - mouse.y;
        }

        function autoFloat(t) {
            distance.x = Math.sin(t / 600) * (window.innerWidth * 0.15);
            distance.y = Math.cos(t / 600) * (window.innerHeight * 0.05);
        }

        function animateHeader(t) {
            if (isSimulating) autoFloat(t);

            lerped.x += (distance.x - lerped.x) * 0.15;
            lerped.y += (distance.y - lerped.y) * 0.15;

            copies.forEach((copy, i) => {
                const index = i + 1;
                const y = index * lerped.y * 0.035;
                const z = index * translateZ;
                const r = index * rotateMult * (lerped.x * 0.001);
                const s = index * skewMult * (lerped.x * 0.001);
                
                // Combine the centering translate(-50%, -50%) WITH the animation logic
                copy.style.transform = `translate(-50%, -50%) perspective(${perspective}px) translate3d(0px, ${y}px, ${z}px) rotate(${r}deg) skew(${s}deg)`;
            });

            // Ensure main text stays dead center
            document.querySelector('h1').style.transform = `translate(-50%, -50%)`;
            requestAnimationFrame(animateHeader);
        }

        /* --- STICKY ZOOM LOGIC --- */
        const track = document.getElementById('zoom-scroll-track');
        const frame = document.getElementById('zoom-iframe');

        window.addEventListener('scroll', () => {
            const rect = track.getBoundingClientRect();
            const windowHeight = window.innerHeight;
            let progress = -rect.top / (rect.height - windowHeight);
            let clamped = Math.max(0, Math.min(1, progress));

            if (frame.contentWindow) {
                frame.contentWindow.postMessage({ type: 'SET_PROGRESS', progress: clamped }, '*');
            }
        });

        window.addEventListener("resize", updateCenter);
        document.addEventListener("mousemove", onMouseMove);
        requestAnimationFrame(animateHeader);
    </script>
</body>
</html>
